<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Calculator</title>
<style>
/* Self-contained 7-segment style using Google-hosted font replacement */
@font-face {
    font-family: 'DSEG7Classic';
    src: url('https://cdn.jsdelivr.net/gh/keshikan/DSEG@2.6/DSEG7Classic/DSEG7Classic-Regular.woff') format('woff');
    font-weight: normal;
    font-style: normal;
}

body {
    font-family: 'DSEG7Classic', monospace;
    background-color: #000;
    color: #0F0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.calculator {
    background: #111;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 20px #0F0;
    display: grid;
    grid-template-columns: repeat(4, 80px);
    grid-gap: 10px;
}

#display {
    font-family: 'DSEG7Classic', monospace;
    font-size: 2em;
    text-align: right;
    background: #000;
    color: #0F0;
    border: 2px solid #0F0;
    padding: 15px;
    margin-bottom: 10px;
    grid-column: span 4;
}

button {
    font-family: 'DSEG7Classic', monospace;
    font-size: 1.2em;
    padding: 20px;
    background-color: #222;
    border: 2px solid #0F0;
    color: #0F0;
    cursor: pointer;
    transition: 0.1s;
}

button:hover {
    background-color: #333;
}

button:active {
    background-color: #0F0;
    color: #000;
}

.square-root-row {
    grid-column: span 4;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-gap: 10px;
}
</style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" disabled="disabled" />

    <button onclick="appendNumber('1')">1</button>
    <button onclick="appendNumber('2')">2</button>
    <button onclick="appendNumber('3')">3</button>
    <button onclick="setOperation('+')">+</button>

    <button onclick="appendNumber('4')">4</button>
    <button onclick="appendNumber('5')">5</button>
    <button onclick="appendNumber('6')">6</button>
    <button onclick="setOperation('-')">-</button>

    <button onclick="appendNumber('7')">7</button>
    <button onclick="appendNumber('8')">8</button>
    <button onclick="appendNumber('9')">9</button>
    <button onclick="setOperation('*')">*</button>

    <button onclick="appendNumber('0')">0</button>
    <button onclick="clearDisplay()">C</button>
    <button onclick="calculateResult()">=</button>
    <button onclick="setOperation('/')">/</button>

    <div class="square-root-row">
        <button onclick="square()">x²</button>
        <button onclick="squareRoot()">√</button>
    </div>
</div>

<script>
let currentInput = '';
let previousInput = '';
let operation = null;

function updateDisplay() {
    document.getElementById('display').value = currentInput;
}

function appendNumber(number) {
    currentInput += number;
    updateDisplay();
}

function setOperation(op) {
    if (currentInput === '') return;
    if (previousInput !== '') calculateResult();
    operation = op;
    previousInput = currentInput;
    currentInput = '';
}

function clearDisplay() {
    currentInput = '';
    previousInput = '';
    operation = null;
    updateDisplay();
}

function calculateResult() {
    if (operation === null || currentInput === '' || previousInput === '') return;
    let result;
    const prev = parseFloat(previousInput);
    const current = parseFloat(currentInput);

    switch (operation) {
        case '+': result = prev + current; break;
        case '-': result = prev - current; break;
        case '*': result = prev * current; break;
        case '/':
            if (current === 0) { alert('Error: Division by zero'); return; }
            result = prev / current;
            break;
    }

    currentInput = result.toString();
    operation = null;
    previousInput = '';
    updateDisplay();
}

function square() {
    if (currentInput === '') return;
    currentInput = Math.pow(parseFloat(currentInput), 2).toString();
    updateDisplay();
}

function squareRoot() {
    if (currentInput === '') return;
    currentInput = Math.sqrt(parseFloat(currentInput)).toString();
    updateDisplay();
}
</script>

</body>
</html>
